# =============================================================================
# AI House Planner - nginx Configuration (Admin Dashboard)
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---------------------------------------------------------------------------
    # Security headers
    # ---------------------------------------------------------------------------
    add_header X-Frame-Options          "SAMEORIGIN"         always;
    add_header X-Content-Type-Options   "nosniff"            always;
    add_header X-XSS-Protection         "1; mode=block"      always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # ---------------------------------------------------------------------------
    # SPA routing - serve index.html for all non-file requests
    # ---------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;

        # Cache HTML files for a short duration (re-validate with server)
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ---------------------------------------------------------------------------
    # API proxy - forward /api/* to backend service
    # ---------------------------------------------------------------------------
    location /api {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # Rate limiting headers pass-through
        proxy_pass_header  X-RateLimit-Limit;
        proxy_pass_header  X-RateLimit-Remaining;
        proxy_pass_header  X-RateLimit-Reset;
    }

    # ---------------------------------------------------------------------------
    # Static asset caching
    # ---------------------------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---------------------------------------------------------------------------
    # Gzip compression
    # ---------------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   1000;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # ---------------------------------------------------------------------------
    # Error pages
    # ---------------------------------------------------------------------------
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;

    # ---------------------------------------------------------------------------
    # Hide nginx version
    # ---------------------------------------------------------------------------
    server_tokens off;
}
